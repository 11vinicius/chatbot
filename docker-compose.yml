services:
  db:
    image: postgres:15
    container_name: chatboot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: chatboot
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"   # <- mudou aqui

volumes:
  pgdata: